[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Backend modules import as `app.*` and `data.grid.*`. We need the
# backend directory and the repo root on sys.path. conftest.py handles
# this; pythonpath here is a belt-and-suspenders for `pytest --rootdir`.
pythonpath = . ..
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
